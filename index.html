<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
  :root{
    --bg:#0e1220;
    --panel:#1a2135;
    --cell:#232c47;
    --text:#eef1fa;
    --muted:#8b94b3;
    --accent:#ffc857;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:radial-gradient(1200px 800px at 50% -10%, #1b2340 0%, var(--bg) 60%);
    color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    display:flex;align-items:center;justify-content:center;
    touch-action:none;
  }
  .wrap{width:min(92vw,440px);padding:16px 0}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
  h1{font-size:52px;line-height:1;letter-spacing:-2px;
     background:linear-gradient(135deg,#5ee6c9,#ffc857 55%,#ff6f91);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .scores{display:flex;gap:8px}
  .scorebox{background:var(--panel);border-radius:10px;padding:8px 14px;text-align:center;min-width:76px}
  .scorebox .lbl{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
  .scorebox .val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .bar p{color:var(--muted);font-size:13px;max-width:230px}
  button{
    background:var(--accent);color:#26200c;border:none;border-radius:10px;
    padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;
    transition:transform .1s ease, filter .15s ease;
  }
  button:hover{filter:brightness(1.08)}
  button:active{transform:scale(.96)}
  button:focus-visible{outline:2px solid #fff;outline-offset:2px}

  .board{
    position:relative;background:var(--panel);border-radius:14px;
    padding:10px;aspect-ratio:1/1;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.45);
  }
  .grid{position:absolute;inset:10px;display:grid;grid-template:repeat(4,1fr)/repeat(4,1fr);gap:10px}
  .cell{background:var(--cell);border-radius:10px}
  .tiles{position:absolute;inset:10px}
  .tile{
    position:absolute;display:flex;align-items:center;justify-content:center;
    border-radius:10px;font-weight:800;
    width:calc((100% - 30px)/4);height:calc((100% - 30px)/4);
    transition:transform .12s ease-in-out;
    will-change:transform;
  }
  .tile.new{animation:pop .18s ease}
  .tile.merged{animation:merge .2s ease}
  @keyframes pop{0%{scale:.4;opacity:0}100%{scale:1;opacity:1}}
  @keyframes merge{0%{scale:1}50%{scale:1.18}100%{scale:1}}
  @media (prefers-reduced-motion:reduce){
    .tile{transition:none}.tile.new,.tile.merged{animation:none}
  }

  .overlay{
    position:absolute;inset:0;border-radius:14px;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:14px;
    background:rgba(14,18,32,.85);backdrop-filter:blur(4px);z-index:5;text-align:center;
  }
  .overlay.show{display:flex;animation:fadein .3s ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .overlay h2{font-size:34px}
  .overlay .win{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>2048</h1>
      <div class="sub">Ghép các ô để đạt <b>2048</b>!</div>
    </div>
    <div class="scores">
      <div class="scorebox"><div class="lbl">Điểm</div><div class="val" id="score">0</div></div>
      <div class="scorebox"><div class="lbl">Kỷ lục</div><div class="val" id="best">0</div></div>
    </div>
  </header>
  <div class="bar">
    <p>Dùng phím mũi tên / WASD hoặc vuốt trên màn hình.</p>
    <button id="newgame">Chơi mới</button>
  </div>
  <div class="board" id="board">
    <div class="grid" id="grid"></div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay" id="overlay">
      <h2 id="ov-title">Hết nước đi!</h2>
      <button id="ov-btn">Chơi lại</button>
    </div>
  </div>
</div>

<script>
(() => {
  const SIZE = 4;
  const gridEl = document.getElementById('grid');
  const tilesEl = document.getElementById('tiles');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');

  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    gridEl.appendChild(c);
  }

  const COLORS = {
    2:    ['#2e3a5c','#cfd8f7'],
    4:    ['#37456e','#dfe6ff'],
    8:    ['#2f7f8f','#eafcff'],
    16:   ['#28a08f','#eafff8'],
    32:   ['#5ee6c9','#0c2a23'],
    64:   ['#ffc857','#3a2c05'],
    128:  ['#ffab3d','#3a2405'],
    256:  ['#ff8b4a','#38180a'],
    512:  ['#ff6f91','#3a0a18'],
    1024: ['#d95bd0','#2f0a2c'],
    2048: ['#9b5bff','#f4edff'],
  };
  const glow = v => v >= 128 ? `0 0 ${Math.min(30, Math.log2(v)*3)}px ${COLORS[v]?.[0] || '#9b5bff'}66` : 'none';

  let board, score, best = 0, won, over, idc = 0, tiles = {};
  try { best = +localStorage.getItem('best2048') || 0; } catch(e) {}
  bestEl.textContent = best;

  function pct(i){ return `calc(${i} * (100% + 10px) / 4)`; }
  // simpler: use transform with percentage of tile size
  function setPos(el, r, c){
    el.style.transform = `translate(calc(${c} * (100% + 10px)), calc(${r} * (100% + 10px)))`;
  }

  function fontSize(v){
    const board = document.getElementById('board').clientWidth;
    const cell = (board - 50) / 4;
    const len = String(v).length;
    return Math.floor(cell * (len <= 2 ? .5 : len === 3 ? .4 : .32)) + 'px';
  }

  function makeTile(r, c, v, cls){
    const id = ++idc;
    const el = document.createElement('div');
    el.className = 'tile ' + (cls || '');
    const [bg, fg] = COLORS[v] || ['#9b5bff','#f4edff'];
    el.style.background = bg;
    el.style.color = fg;
    el.style.boxShadow = glow(v);
    el.style.fontSize = fontSize(v);
    el.textContent = v;
    setPos(el, r, c);
    tilesEl.appendChild(el);
    tiles[id] = el;
    return id;
  }

  function newGame(){
    tilesEl.innerHTML = '';
    tiles = {};
    board = Array.from({length:SIZE},()=>Array(SIZE).fill(null)); // {v,id}
    score = 0; won = false; over = false;
    scoreEl.textContent = 0;
    overlay.classList.remove('show');
    spawn(); spawn();
  }

  function spawn(){
    const empty = [];
    board.forEach((row,r)=>row.forEach((c,ci)=>{ if(!c) empty.push([r,ci]); }));
    if(!empty.length) return;
    const [r,c] = empty[Math.random()*empty.length|0];
    const v = Math.random() < 0.9 ? 2 : 4;
    board[r][c] = { v, id: makeTile(r,c,v,'new') };
  }

  function move(dr, dc){
    if (over) return;
    let moved = false, gained = 0;
    const range = [...Array(SIZE).keys()];
    const rows = dr === 1 ? [...range].reverse() : range;
    const cols = dc === 1 ? [...range].reverse() : range;
    const mergedFlag = new Set();

    for (const r of rows) for (const c of cols) {
      const cell = board[r][c];
      if (!cell) continue;
      let nr = r, nc = c;
      while (true) {
        const tr = nr + dr, tc = nc + dc;
        if (tr < 0 || tr >= SIZE || tc < 0 || tc >= SIZE) break;
        const target = board[tr][tc];
        if (!target) { nr = tr; nc = tc; continue; }
        if (target.v === cell.v && !mergedFlag.has(target)) { nr = tr; nc = tc; }
        break;
      }
      if (nr === r && nc === c) continue;
      moved = true;
      const target = board[nr][nc];
      board[r][c] = null;
      const el = tiles[cell.id];
      setPos(el, nr, nc);
      if (target) {
        // merge
        const nv = cell.v * 2;
        gained += nv;
        const old = target;
        board[nr][nc] = { v: nv, id: null };
        mergedFlag.add(board[nr][nc]);
        setTimeout(() => {
          el.remove(); tiles[old.id]?.remove();
          delete tiles[cell.id]; delete tiles[old.id];
          board[nr][nc].id = makeTile(nr, nc, nv, 'merged');
          if (nv === 2048 && !won) { won = true; ovTitle.textContent = '🎉 Bạn thắng rồi!'; ovTitle.classList.add('win'); overlay.classList.add('show'); }
        }, 120);
      } else {
        board[nr][nc] = cell;
      }
    }

    if (moved) {
      score += gained;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best;
        try { localStorage.setItem('best2048', best); } catch(e) {} }
      setTimeout(() => {
        spawn();
        if (!canMove()) { over = true; ovTitle.textContent = 'Hết nước đi!'; ovTitle.classList.remove('win'); overlay.classList.add('show'); }
      }, 130);
    }
  }

  function canMove(){
    for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
      const cell = board[r][c];
      if (!cell) return true;
      if (r+1 < SIZE && board[r+1][c]?.v === cell.v) return true;
      if (c+1 < SIZE && board[r][c+1]?.v === cell.v) return true;
    }
    return false;
  }

  // keyboard
  const KEYS = {
    ArrowUp:[-1,0], ArrowDown:[1,0], ArrowLeft:[0,-1], ArrowRight:[0,1],
    w:[-1,0], s:[1,0], a:[0,-1], d:[0,1],
    W:[-1,0], S:[1,0], A:[0,-1], D:[0,1],
  };
  document.addEventListener('keydown', e => {
    const dir = KEYS[e.key];
    if (dir) { e.preventDefault(); move(...dir); }
  });

  // touch
  let tx, ty;
  const boardEl = document.getElementById('board');
  boardEl.addEventListener('touchstart', e => {
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }, {passive:true});
  boardEl.addEventListener('touchend', e => {
    if (tx == null) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 25) return;
    if (Math.abs(dx) > Math.abs(dy)) move(0, dx > 0 ? 1 : -1);
    else move(dy > 0 ? 1 : -1, 0);
    tx = ty = null;
  });

  document.getElementById('newgame').onclick = newGame;
  document.getElementById('ov-btn').onclick = newGame;

  newGame();
})();
</script>
</body>
</html>
